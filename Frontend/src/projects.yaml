- slug: muse-studios
  title: MUSE STUDIOS
  description: "Inspired by Muse Studios' philosophy of mindful movement, I developed a visual identity that reflects balance, energy and clarity. Muse's brand identity draws inspiration from the precision and flow of pilates practice, translating the studio's focus on strength, flexibility and mindful motion into clean and engaging visuals. I created a logo that captures the fluidity of movement, along with social media assets and a user-friendly app interface, ensuring the brand experience is consistent across both digital and physical touchpoints."
  type: UX/UI & BRANDING
